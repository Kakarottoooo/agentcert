name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy
        run: mypy src/mcpbench
      - name: Pytest
        run: pytest

  tripwire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/tripwire-ci/package-lock.json
      - name: Install Tripwire dependencies
        run: npm --prefix packages/tripwire-ci ci
      - name: Build Tripwire
        run: npm --prefix packages/tripwire-ci run build
      - name: Test Tripwire unit suite
        run: npm --prefix packages/tripwire-ci test

  onegent-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/onegent-runtime/package-lock.json
      - name: Install Onegent Runtime dependencies
        run: npm --prefix packages/onegent-runtime ci
      - name: Build Onegent Runtime
        run: npm --prefix packages/onegent-runtime run build
      - name: Test Onegent Runtime
        run: npm --prefix packages/onegent-runtime test

  agentcert-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/agentcert-cli/package-lock.json
      - name: Install AgentCert CLI dependencies
        run: npm --prefix packages/agentcert-cli ci
      - name: Build AgentCert CLI
        run: npm --prefix packages/agentcert-cli run build
      - name: Test AgentCert CLI
        run: npm --prefix packages/agentcert-cli test

  control-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            packages/agentcert-dashboard/package-lock.json
            packages/agentcert-control-plane/package-lock.json
            packages/agentcert-sdk/package-lock.json
            packages/agentcert-mcp-adapter/package-lock.json
      - name: Install control plane dependencies
        run: npm run control-plane:install
      - name: Install external CLI package dependencies
        run: npm --prefix packages/agentcert-cli ci
      - name: Test control plane packages
        run: npm run control-plane:test
      - name: Test production smoke harness
        run: npm run production-smoke:test
      - name: Test backup restore safety guardrails
        run: npm run backup-restore:test
      - name: Test real vendor sandbox acceptance harness
        run: npm run vendor-sandbox:test
      - name: Test empty-repository hosted onboarding
        run: npm run onboarding:e2e
      - name: Build control plane image
        run: docker build --file Dockerfile.control-plane --tag agentcert-control-plane:ci .
