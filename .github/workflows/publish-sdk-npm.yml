name: Publish agentcert-sdk to npm

on:
  push:
    tags:
      - "sdk-v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/agentcert-sdk
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: packages/agentcert-sdk/package-lock.json

      - name: Use npm with trusted publishing support
        run: npm install -g npm@^11.5.1

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#sdk-v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version $package_version"
            exit 1
          fi

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --access public
