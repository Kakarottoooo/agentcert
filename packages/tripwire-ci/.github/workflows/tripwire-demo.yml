name: Tripwire Demo

on:
  pull_request:
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run build
      - run: npm run demo:tripwire
      - name: Demonstrate stricter gate
        run: npm run demo:gate
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tripwire-demo
          path: .tripwire/latest
