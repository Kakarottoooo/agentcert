name: AgentCert Tripwire
description: Run Tripwire browser-agent robustness gates and emit AgentCert evidence.
inputs:
  config:
    description: Tripwire config path in the caller repository.
    default: tripwire.yml
  pull-request-config:
    description: Optional quicker Tripwire config for pull-request checks. Falls back to config.
    required: false
  release-config:
    description: Optional authoritative Tripwire config for release checks. Falls back to config.
    required: false
  nightly-config:
    description: Optional expanded Tripwire config for scheduled checks. Falls back to config.
    required: false
  out:
    description: Tripwire output directory in the caller repository.
    default: .tripwire/latest
  fail-under:
    description: Optional Tripwire pass-rate threshold override from 0 to 1.
    required: false
  subject:
    description: AgentCert subject name. Defaults to the GitHub repository.
    required: false
  agentcert-out:
    description: AgentCert evidence output directory in the caller repository.
    default: .agentcert/latest
  install-playwright:
    description: Install Playwright Chromium before running Tripwire.
    default: "true"
  upload-artifact:
    description: Upload Tripwire and AgentCert artifacts at the end of the job.
    default: "true"
  artifact-name:
    description: Uploaded artifact bundle name.
    default: agentcert-tripwire
  fail-on-verdict:
    description: Fail if the unified AgentCert verdict fails, in addition to the Tripwire gate.
    default: "false"
  release-gate:
    description: Build the ten-control AgentCert release gate from the generated evidence bundle.
    default: "true"
  strict-release-gate:
    description: Fail when evidence-required or manual controls have not been attested.
    default: "false"
  baseline:
    description: Optional baseline AgentCert evidence bundle for continuous regression detection.
    required: false
  max-score-drop:
    description: Maximum allowed score drop from the baseline.
    default: "0"
  push-hosted:
    description: Upload the run and evidence to AgentCert Hosted. Uses AGENTCERT_API_KEY, AGENTCERT_PROJECT_ID, and optionally AGENTCERT_BASE_URL from the caller environment.
    default: "false"
  assurance-case:
    description: Optional issued assurance case ID to reconcile after the hosted run completes.
    required: false
  assurance-scope:
    description: Continuous assurance scope JSON path in the caller repository.
    default: agentcert.assurance-scope.json
  assurance-trigger:
    description: Continuous assurance trigger (auto, pull_request, release, or nightly).
    default: auto
  require-current:
    description: Fail unless Hosted confirms authoritative CURRENT with complete evidence (true, false, or auto).
    default: "false"
  continuous-health-out:
    description: Redacted Hosted continuous assurance health output path.
    default: .agentcert/latest/continuous-assurance-health.json
  publish-pages:
    description: >-
      Publish the evidence reports and badge to a GitHub Pages branch and emit
      a clickable badge snippet. Requires contents write permission in the
      caller workflow.
    default: "false"
  pages-branch:
    description: Branch the evidence page is pushed to when publish-pages is true.
    default: gh-pages
  pages-dir:
    description: Directory inside the Pages branch that holds the evidence page.
    default: agentcert
outputs:
  agentcert-version:
    description: AgentCert CLI version bundled by this Action release.
    value: ${{ steps.toolchain.outputs.agentcert-version }}
  tripwire-result:
    description: Path to tripwire-result.json.
    value: ${{ inputs.out }}/tripwire-result.json
  tripwire-report:
    description: Path to tripwire-report.html.
    value: ${{ inputs.out }}/tripwire-report.html
  junit:
    description: Path to Tripwire JUnit XML.
    value: ${{ inputs.out }}/junit.xml
  evidence:
    description: Path to AgentCert evidence bundle.
    value: ${{ inputs.agentcert-out }}/agentcert-evidence.json
  agentcert-report:
    description: Path to AgentCert HTML report.
    value: ${{ inputs.agentcert-out }}/agentcert-report.html
  badge:
    description: Path to AgentCert badge SVG.
    value: ${{ inputs.agentcert-out }}/badge.svg
  monitor:
    description: Path to AgentCert monitor snapshot.
    value: ${{ inputs.agentcert-out }}/monitor.json
  reviewed-dataset:
    description: Path to reviewed failure dataset JSONL.
    value: ${{ inputs.agentcert-out }}/reviewed-failure-dataset.jsonl
  release-gate-report:
    description: Path to the machine-readable ten-control release gate report.
    value: ${{ inputs.agentcert-out }}/agentcert-release-gate.json
  release-gate-junit:
    description: Path to release gate JUnit XML.
    value: ${{ inputs.agentcert-out }}/agentcert-release-gate-junit.xml
  continuous-health:
    description: Path to the Hosted continuous assurance health contract.
    value: ${{ inputs.continuous-health-out }}
  pages-url:
    description: Base URL of the published evidence page (when publish-pages is true).
    value: ${{ steps.publish-pages.outputs.pages-url }}
  badge-markdown:
    description: Clickable badge markdown pointing at the hosted evidence page (when publish-pages is true).
    value: ${{ steps.publish-pages.outputs.badge-markdown }}
runs:
  using: composite
  steps:
    - name: Install AgentCert toolchain
      id: toolchain
      shell: bash
      run: |
        set -euo pipefail
        ACTION_ROOT="$(cd "$GITHUB_ACTION_PATH/../.." && pwd)"
        echo "AGENTCERT_ACTION_ROOT=$ACTION_ROOT" >> "$GITHUB_ENV"
        agentcert_version="$(node -p "require('$ACTION_ROOT/packages/agentcert-cli/package.json').version")"
        echo "agentcert-version=$agentcert_version" >> "$GITHUB_OUTPUT"
        echo "AgentCert CLI $agentcert_version"
        npm ci --prefix "$ACTION_ROOT/packages/tripwire-ci"
        npm ci --prefix "$ACTION_ROOT/packages/agentcert-cli"
        npm run --prefix "$ACTION_ROOT/packages/tripwire-ci" build
        npm run --prefix "$ACTION_ROOT/packages/agentcert-cli" build

    - name: Install Playwright Chromium
      if: ${{ inputs.install-playwright == 'true' }}
      shell: bash
      run: npm --prefix "$AGENTCERT_ACTION_ROOT/packages/tripwire-ci" exec -- playwright install chromium

    - name: Run Tripwire
      shell: bash
      run: |
        set +e
        assurance_trigger="${{ inputs.assurance-trigger }}"
        if [ "$assurance_trigger" = "auto" ]; then
          case "${GITHUB_EVENT_NAME:-}" in
            pull_request|pull_request_target) assurance_trigger="pull_request" ;;
            schedule) assurance_trigger="nightly" ;;
            *) assurance_trigger="release" ;;
          esac
        fi
        case "$assurance_trigger" in
          pull_request)
            tripwire_config="${{ inputs.pull-request-config }}"
            ;;
          release)
            tripwire_config="${{ inputs.release-config }}"
            ;;
          nightly)
            tripwire_config="${{ inputs.nightly-config }}"
            ;;
          *)
            echo "::error::assurance-trigger must be auto, pull_request, release, or nightly"
            exit 2
            ;;
        esac
        if [ -z "$tripwire_config" ]; then
          tripwire_config="${{ inputs.config }}"
        fi
        echo "AGENTCERT_ASSURANCE_TRIGGER_RESOLVED=$assurance_trigger" >> "$GITHUB_ENV"
        echo "AGENTCERT_TRIPWIRE_CONFIG=$tripwire_config" >> "$GITHUB_ENV"
        args=(run -c "$tripwire_config" --out "${{ inputs.out }}")
        if [ -n "${{ inputs.fail-under }}" ]; then
          args+=(--fail-under "${{ inputs.fail-under }}")
        fi
        node "$AGENTCERT_ACTION_ROOT/packages/tripwire-ci/dist/cli.js" "${args[@]}"
        tripwire_exit=$?
        echo "AGENTCERT_TRIPWIRE_EXIT=$tripwire_exit" >> "$GITHUB_ENV"
        exit 0

    - name: Generate AgentCert evidence
      if: always()
      shell: bash
      run: |
        set +e
        subject="${{ inputs.subject }}"
        if [ -z "$subject" ]; then
          subject="${GITHUB_REPOSITORY:-agentcert-subject}"
        fi
        args=(
          run
          --tripwire "${{ inputs.out }}/tripwire-result.json"
          --out "${{ inputs.agentcert-out }}"
          --corpus "${{ inputs.agentcert-out }}/corpus.jsonl"
          --monitor-out "${{ inputs.agentcert-out }}/monitor.json"
          --reviewed-dataset-out "${{ inputs.agentcert-out }}/reviewed-failure-dataset.jsonl"
          --subject "$subject"
          --replace
        )
        if [ "${{ inputs.fail-on-verdict }}" = "true" ]; then
          args+=(--fail-on-verdict)
        fi
        if [ "${{ inputs.push-hosted }}" = "true" ]; then
          args+=(--push)
          if [ -n "${{ inputs.assurance-case }}" ]; then
            args+=(
              --assurance-case "${{ inputs.assurance-case }}"
              --assurance-scope "${{ inputs.assurance-scope }}"
              --assurance-trigger "${AGENTCERT_ASSURANCE_TRIGGER_RESOLVED:-${{ inputs.assurance-trigger }}}"
            )
            if [ -n "${{ inputs.continuous-health-out }}" ]; then
              args+=(--continuous-health-out "${{ inputs.continuous-health-out }}")
            fi
            require_current="${{ inputs.require-current }}"
            if [ "$require_current" = "auto" ]; then
              case "${AGENTCERT_ASSURANCE_TRIGGER_RESOLVED:-}" in
                release|nightly) require_current="true" ;;
                *) require_current="false" ;;
              esac
            fi
            if [ "$require_current" = "true" ]; then
              args+=(--require-current)
            elif [ "$require_current" != "false" ]; then
              echo "::error::require-current must be true, false, or auto"
              exit 2
            fi
          fi
        fi
        node "$AGENTCERT_ACTION_ROOT/packages/agentcert-cli/dist/cli.js" "${args[@]}"
        agentcert_exit=$?
        echo "AGENTCERT_RUN_EXIT=$agentcert_exit" >> "$GITHUB_ENV"
        exit 0

    - name: Build AgentCert release gate
      if: ${{ always() && inputs.release-gate == 'true' }}
      shell: bash
      run: |
        set +e
        args=(
          release-gate
          --evidence "${{ inputs.agentcert-out }}/agentcert-evidence.json"
          --out "${{ inputs.agentcert-out }}"
          --max-score-drop "${{ inputs.max-score-drop }}"
        )
        if [ "${{ inputs.strict-release-gate }}" = "true" ]; then
          args+=(--strict)
        fi
        if [ -n "${{ inputs.baseline }}" ]; then
          args+=(--baseline "${{ inputs.baseline }}")
        fi
        node "$AGENTCERT_ACTION_ROOT/packages/agentcert-cli/dist/cli.js" "${args[@]}"
        release_gate_exit=$?
        echo "AGENTCERT_RELEASE_GATE_EXIT=$release_gate_exit" >> "$GITHUB_ENV"
        exit 0

    - name: Publish evidence page and badge
      id: publish-pages
      if: ${{ always() && inputs.publish-pages == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        branch="${{ inputs.pages-branch }}"
        dir="${{ inputs.pages-dir }}"
        owner="${GITHUB_REPOSITORY%%/*}"
        repo="${GITHUB_REPOSITORY#*/}"
        workdir="$(mktemp -d)"
        repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        if git ls-remote --exit-code --heads "$repo_url" "$branch" >/dev/null 2>&1; then
          git clone --depth 1 --branch "$branch" "$repo_url" "$workdir"
        else
          git init -b "$branch" "$workdir"
          git -C "$workdir" remote add origin "$repo_url"
        fi
        rm -rf "$workdir/$dir"
        mkdir -p "$workdir/$dir/tripwire" "$workdir/$dir/latest"
        cp -R "${{ inputs.out }}/." "$workdir/$dir/tripwire/"
        cp -R "${{ inputs.agentcert-out }}/." "$workdir/$dir/latest/"
        touch "$workdir/.nojekyll"
        git -C "$workdir" add -A
        if git -C "$workdir" -c user.name="agentcert[bot]" -c user.email="agentcert-bot@users.noreply.github.com" commit -m "agentcert: update evidence for ${GITHUB_SHA:-manual-run}" >/dev/null; then
          git -C "$workdir" push origin "$branch"
        else
          echo "No evidence changes to publish."
        fi
        pages_url="https://${owner}.github.io/${repo}/${dir}"
        badge_md="[![AgentCert](${pages_url}/latest/badge.svg)](${pages_url}/latest/agentcert-report.html)"
        echo "pages-url=${pages_url}" >> "$GITHUB_OUTPUT"
        echo "badge-markdown=${badge_md}" >> "$GITHUB_OUTPUT"
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          {
            echo "### AgentCert badge"
            echo
            echo "Hosted evidence page: ${pages_url}/latest/agentcert-report.html"
            echo
            echo "Add the clickable badge to your README:"
            echo
            echo '```markdown'
            echo "$badge_md"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Write AgentCert summary
      if: always()
      shell: bash
      run: |
        if [ -z "${GITHUB_STEP_SUMMARY:-}" ]; then
          exit 0
        fi
        {
          echo "## AgentCert Tripwire"
          echo
          echo "- AgentCert CLI: \`${{ steps.toolchain.outputs.agentcert-version }}\`"
          echo "- Tripwire result: \`${{ inputs.out }}/tripwire-result.json\`"
          echo "- Tripwire report: \`${{ inputs.out }}/tripwire-report.html\`"
          echo "- JUnit: \`${{ inputs.out }}/junit.xml\`"
          echo "- Evidence bundle: \`${{ inputs.agentcert-out }}/agentcert-evidence.json\`"
          echo "- AgentCert HTML report: \`${{ inputs.agentcert-out }}/agentcert-report.html\`"
          echo "- Badge: \`${{ inputs.agentcert-out }}/badge.svg\`"
          echo "- Monitor snapshot: \`${{ inputs.agentcert-out }}/monitor.json\`"
          echo "- Reviewed dataset: \`${{ inputs.agentcert-out }}/reviewed-failure-dataset.jsonl\`"
          echo "- Release gate: \`${{ inputs.agentcert-out }}/agentcert-release-gate.html\`"
          echo "- Release gate JUnit: \`${{ inputs.agentcert-out }}/agentcert-release-gate-junit.xml\`"
          echo "- Hosted continuous assurance: \`${{ inputs.push-hosted }}\`"
          echo "- Assurance trigger: \`${AGENTCERT_ASSURANCE_TRIGGER_RESOLVED:-not-bound}\`"
          if [ -f "${{ inputs.continuous-health-out }}" ]; then
            node -e 'const h=JSON.parse(require("node:fs").readFileSync(process.argv[1],"utf8")); console.log(`- Hosted status: \`${h.status}\``); console.log(`- Evidence integrity: \`${h.evidence.status}\``); if (h.assurance.timeToFirstCurrentMs !== undefined) console.log(`- Install to first CURRENT: \`${h.assurance.timeToFirstCurrentMs} ms\``);' "${{ inputs.continuous-health-out }}"
          fi
          echo "- Tripwire config: \`${AGENTCERT_TRIPWIRE_CONFIG:-${{ inputs.config }}}\`"
        } >> "$GITHUB_STEP_SUMMARY"
        if [ -f "${{ inputs.agentcert-out }}/agentcert-report.md" ]; then
          {
            echo
            cat "${{ inputs.agentcert-out }}/agentcert-report.md"
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload AgentCert artifacts
      if: ${{ always() && inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ inputs.out }}/
          ${{ inputs.agentcert-out }}/
        if-no-files-found: warn

    - name: Apply AgentCert gate
      if: always()
      shell: bash
      run: |
        if [ "${AGENTCERT_TRIPWIRE_EXIT:-0}" != "0" ]; then
          exit "$AGENTCERT_TRIPWIRE_EXIT"
        fi
        if [ "${AGENTCERT_RUN_EXIT:-0}" != "0" ]; then
          exit "$AGENTCERT_RUN_EXIT"
        fi
        if [ "${AGENTCERT_RELEASE_GATE_EXIT:-0}" != "0" ]; then
          exit "$AGENTCERT_RELEASE_GATE_EXIT"
        fi
