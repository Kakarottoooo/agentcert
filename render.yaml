services:
  - type: web
    name: agentcert-control-plane
    runtime: docker
    dockerfilePath: ./Dockerfile.control-plane
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: AGENTCERT_DASHBOARD_DIR
        value: /app/public-demo/agentcert-monitor
      - key: AGENTCERT_STORAGE_BUCKET
        value: agentcert-evidence
      - key: AGENTCERT_MAX_ARTIFACT_BYTES
        value: 20971520
      - key: AGENTCERT_PROJECT_STORAGE_BYTES
        value: 1073741824
      - key: AGENTCERT_RUN_STORAGE_BYTES
        value: 104857600
      - key: AGENTCERT_EVIDENCE_RETENTION_DAYS
        value: 90
      - key: AGENTCERT_EVIDENCE_CLEANUP_INTERVAL_MS
        value: 86400000
      - key: AGENTCERT_EVIDENCE_CLEANUP_BATCH
        value: 500
      - key: AGENTCERT_RATE_LIMIT_REQUESTS
        value: 300
      - key: AGENTCERT_RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: AGENTCERT_WEBHOOK_WORKER_INTERVAL_MS
        value: 2000
      - key: AGENTCERT_WEBHOOK_WORKER_BATCH
        value: 20
      - key: AGENTCERT_NOTIFICATION_WORKER_INTERVAL_MS
        value: 5000
      - key: AGENTCERT_NOTIFICATION_WORKER_BATCH
        value: 20
      - key: AGENTCERT_ASSURANCE_MAINTENANCE_INTERVAL_MS
        value: 21600000
      - key: AGENTCERT_ASSURANCE_MAINTENANCE_BATCH
        value: 200
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: agentcert-coordination
          property: connectionString
      - key: AGENTCERT_PLATFORM_ADMIN_EMAILS
        sync: false
      - key: AGENTCERT_EVIDENCE_SIGNING_PRIVATE_KEY
        sync: false
      - key: AGENTCERT_EVIDENCE_SIGNING_KEY_ID
        value: agentcert-prod-v0.1
      - key: AGENTCERT_WEBHOOK_ENCRYPTION_KEY
        sync: false
      - key: AGENTCERT_PUBLIC_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: AGENTCERT_ALERT_FROM_EMAIL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false

  - type: keyvalue
    name: agentcert-coordination
    region: oregon
    plan: free
    maxmemoryPolicy: noeviction
    persistenceMode: off
    ipAllowList: []
